name: Build Windows

on:
  push:
    branches: [main, build/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/ComfyCarry/ComfyCarry.csproj
        continue-on-error: true

      - name: Build (diag verbosity)
        run: |
          dotnet build src/ComfyCarry/ComfyCarry.csproj -c Release -p:Platform=x64 -v diag 2>&1 | Tee-Object -FilePath build.log
        shell: pwsh
        continue-on-error: true

      - name: Run XamlCompiler directly (capture stderr)
        if: always()
        shell: pwsh
        run: |
          $base = "src/ComfyCarry/obj/x64/Release/net8.0-windows10.0.19041.0/win-x64"
          $inputJson = "$base/input.json"
          $outputJson = "$base/output2.json"
          # XamlCompiler.exe 在 nuget 包的 tools/net472 下
          $xc = Get-ChildItem "C:\Users\runneradmin\.nuget\packages\microsoft.windowsappsdk\1.5.240607001" -Recurse -Filter XamlCompiler.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($xc -and (Test-Path $inputJson)) {
            Write-Host "Using: $($xc.FullName)"
            $p = Start-Process -FilePath $xc.FullName -ArgumentList "`"$inputJson`"", "`"$outputJson`"" -NoNewWindow -Wait -PassThru -RedirectStandardError xamlcerr.txt -RedirectStandardOutput xamlcout.txt
            Write-Host "Exit: $($p.ExitCode)"
            Write-Host "--- stdout ---"; if (Test-Path xamlcout.txt) { Get-Content xamlcout.txt -Raw }
            Write-Host "--- stderr ---"; if (Test-Path xamlcerr.txt) { Get-Content xamlcerr.txt -Raw }
          } else {
            Write-Host "XamlCompiler or input.json not found"
          }

      - name: Publish (self-contained, unpackaged)
        run: |
          dotnet publish src/ComfyCarry/ComfyCarry.csproj -c Release -r win-x64 -p:Platform=x64 -p:WindowsPackageType=None -p:SelfContained=true -o publish 2>&1 | Tee-Object -FilePath publish.log
        shell: pwsh
        continue-on-error: true

      - name: Download rclone.exe into publish
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest $url -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone-extract -Force
          $exe = Get-ChildItem rclone-extract -Recurse -Filter rclone.exe | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName publish/rclone.exe -Force
            Write-Host "rclone.exe copied"
          } else {
            Write-Host "rclone.exe not found in archive"
          }

      - name: Zip artifact
        shell: pwsh
        run: |
          if (Test-Path publish) {
            Compress-Archive -Path publish/* -DestinationPath ComfyCarry-windows-x64.zip -Force
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            publish.log
            xamlcout.txt
            xamlcerr.txt
            src/ComfyCarry/obj/**/*.json
            src/ComfyCarry/obj/**/*.txt

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ComfyCarry-windows-x64
          path: |
            ComfyCarry-windows-x64.zip
            src/ComfyCarry/bin/
