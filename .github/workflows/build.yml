name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish launcher
        shell: pwsh
        run: |
          dotnet publish src/ComfyCarry.Launcher/ComfyCarry.Launcher.csproj `
            -c Release -p:Platform=x64 -r win-x64 `
            --self-contained false /p:PublishSingleFile=true `
            -o publish-launcher

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish src/ComfyCarry/ComfyCarry.csproj `
            -c Release -p:Platform=x64 -r win-x64 `
            --self-contained true /p:WindowsAppSdkSelfContained=true `
            /p:PublishSingleFile=false /p:EnableMsixTooling=true `
            -o publish-app

      - name: Download and compress rclone.exe
        shell: pwsh
        run: |
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest $url -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone-extract -Force
          $exe = Get-ChildItem rclone-extract -Recurse -Filter rclone.exe | Select-Object -First 1
          Copy-Item $exe.FullName publish-app/rclone.exe -Force
          $upxUrl = "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"
          Invoke-WebRequest $upxUrl -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx-extract -Force
          $upx = (Get-ChildItem upx-extract -Recurse -Filter upx.exe | Select-Object -First 1).FullName
          & $upx --best --lzma publish-app/rclone.exe

      - name: Assemble and strip
        shell: pwsh
        run: |
          New-Item -ItemType Directory publish -Force | Out-Null
          Copy-Item publish-launcher/ComfyCarry.exe publish/ComfyCarry.exe
          Copy-Item publish-app publish/app -Recurse -Force
          $app = "publish/app"
          Get-ChildItem $app -Directory | Where-Object { $_.Name -notmatch '^(en|zh|Microsoft|Assets)' } | Remove-Item -Recurse -Force
          $rmFiles = @(
            "onnxruntime.dll","DirectML.dll","Microsoft.ML.OnnxRuntime.dll",
            "Microsoft.Windows.AI.*","Microsoft.Windows.Widgets.*","Microsoft.Windows.Workloads.*",
            "NPUDetect.dll","PushNotificationsLongRunningTask.ProxyStub.dll",
            "SessionHandleIPCProxyStub.dll","RestartAgent.exe","workloads.*.json"
          )
          foreach ($pat in $rmFiles) { Get-ChildItem $app -Filter $pat | Remove-Item -Force -ErrorAction SilentlyContinue }
          $debugFiles = @("mscordaccore*.dll","mscordbi.dll","Microsoft.DiaSymReader.Native.amd64.dll")
          foreach ($pat in $debugFiles) { Get-ChildItem $app -Filter $pat | Remove-Item -Force -ErrorAction SilentlyContinue }
          $unused = @(
            "System.Private.Xml.dll","System.Private.DataContractSerialization.dll",
            "System.Data.Common.dll","Microsoft.VisualBasic.Core.dll",
            "System.Text.Encoding.CodePages.dll","System.Net.HttpListener.dll",
            "System.Transactions.Local.dll","System.Net.WebSockets.dll",
            "System.Net.Mail.dll","System.Net.Quic.dll","System.Formats.Tar.dll",
            "System.Threading.Tasks.Dataflow.dll","System.Numerics.Tensors.dll",
            "System.Formats.Asn1.dll","System.Net.Ping.dll","System.IO.Pipes.dll",
            "System.Web.HttpUtility.dll","System.Runtime.Caching.dll"
          )
          foreach ($f in $unused) { Remove-Item (Join-Path $app $f) -Force -ErrorAction SilentlyContinue }

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath ComfyCarry-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComfyCarry-windows-x64
          path: ComfyCarry-windows-x64.zip
