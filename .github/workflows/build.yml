name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild src/ComfyCarry/ComfyCarry.csproj /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Publish (self-contained, unpackaged)
        run: msbuild src/ComfyCarry/ComfyCarry.csproj /t:Publish /p:Configuration=Release /p:Platform=x64 /p:WindowsPackageType=None /p:SelfContained=true /p:RuntimeIdentifier=win-x64 /p:PublishDir=publish -fl -v:minimal

      - name: Download rclone.exe into publish
        shell: pwsh
        run: |
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest $url -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone-extract -Force
          $exe = Get-ChildItem rclone-extract -Recurse -Filter rclone.exe | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName publish/rclone.exe -Force }

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath ComfyCarry-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComfyCarry-windows-x64
          path: ComfyCarry-windows-x64.zip

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: msbuild.log
