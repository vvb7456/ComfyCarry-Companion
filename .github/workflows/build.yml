name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish launcher
        shell: pwsh
        run: |
          dotnet publish src/ComfyCarry.Launcher/ComfyCarry.Launcher.csproj `
            -c Release -p:Platform=x64 -r win-x64 `
            --self-contained false /p:PublishSingleFile=true `
            -o publish-launcher

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish src/ComfyCarry/ComfyCarry.csproj `
            -c Release -p:Platform=x64 -r win-x64 `
            --self-contained true /p:WindowsAppSdkSelfContained=true `
            /p:PublishSingleFile=false /p:EnableMsixTooling=true `
            -o publish-app

      - name: Download and compress rclone.exe
        shell: pwsh
        run: |
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest $url -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone-extract -Force
          $exe = Get-ChildItem rclone-extract -Recurse -Filter rclone.exe | Select-Object -First 1
          Copy-Item $exe.FullName publish-app/rclone.exe -Force
          $upxUrl = "https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip"
          Invoke-WebRequest $upxUrl -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx-extract -Force
          $upx = (Get-ChildItem upx-extract -Recurse -Filter upx.exe | Select-Object -First 1).FullName
          & $upx --best --lzma publish-app/rclone.exe

      - name: Assemble package
        shell: pwsh
        run: |
          New-Item -ItemType Directory publish -Force | Out-Null
          Copy-Item publish-launcher/ComfyCarry.exe publish/ComfyCarry.exe
          Copy-Item publish-app publish/app -Recurse -Force

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath ComfyCarry-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComfyCarry-windows-x64
          path: ComfyCarry-windows-x64.zip
