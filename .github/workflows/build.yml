name: Build Windows

on:
  push:
    branches: [main, build/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/ComfyCarry/ComfyCarry.csproj
        continue-on-error: true

      - name: Build (capture full log)
        run: |
          dotnet build src/ComfyCarry/ComfyCarry.csproj -c Release -p:Platform=x64 -v normal 2>&1 | Tee-Object -FilePath build.log
        shell: pwsh
        continue-on-error: true

      - name: Run XamlCompiler directly to capture errors
        if: always()
        shell: pwsh
        run: |
          $inputJson = "src/ComfyCarry/obj/x64/Release/net8.0-windows10.0.19041.0/win-x64/input.json"
          $outputJson = "src/ComfyCarry/obj/x64/Release/net8.0-windows10.0.19041.0/win-x64/output.json"
          $xc = "C:\Users\runneradmin\.nuget\packages\microsoft.windowsappsdk\1.5.240607001\tools\net472\XamlCompiler.exe"
          if (Test-Path $inputJson) {
            & $xc $inputJson $outputJson 2>&1 | Tee-Object -FilePath xamlcompiler.log
            Write-Host "XamlCompiler exit code: $LASTEXITCODE"
            if (Test-Path $outputJson) { Get-Content $outputJson }
          } else {
            Write-Host "input.json not found"
          }

      - name: Publish (self-contained, unpackaged)
        run: |
          dotnet publish src/ComfyCarry/ComfyCarry.csproj -c Release -r win-x64 -p:Platform=x64 -p:WindowsPackageType=None -p:SelfContained=true -o publish 2>&1 | Tee-Object -FilePath publish.log
        shell: pwsh
        continue-on-error: true

      - name: Download rclone.exe into publish
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest $url -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone-extract -Force
          $exe = Get-ChildItem rclone-extract -Recurse -Filter rclone.exe | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName publish/rclone.exe -Force
            Write-Host "rclone.exe copied"
          } else {
            Write-Host "rclone.exe not found in archive"
          }

      - name: Zip artifact
        shell: pwsh
        run: |
          if (Test-Path publish) {
            Compress-Archive -Path publish/* -DestinationPath ComfyCarry-windows-x64.zip -Force
          }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            publish.log
            xamlcompiler.log
            src/ComfyCarry/obj/**/*.json
            src/ComfyCarry/obj/**/*.txt

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ComfyCarry-windows-x64
          path: |
            ComfyCarry-windows-x64.zip
            src/ComfyCarry/bin/
