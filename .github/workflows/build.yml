name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/ComfyCarry/ComfyCarry.csproj

      - name: Publish (self-contained, unpackaged)
        shell: pwsh
        run: |
          dotnet publish src/ComfyCarry/ComfyCarry.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:WindowsAppSdkSelfContained=true `
            /p:PublishSingleFile=false `
            /p:EnableMsixTooling=true `
            -o publish

      - name: Download rclone.exe into publish
        shell: pwsh
        run: |
          $url = "https://downloads.rclone.org/rclone-current-windows-amd64.zip"
          Invoke-WebRequest $url -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath rclone-extract -Force
          $exe = Get-ChildItem rclone-extract -Recurse -Filter rclone.exe | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName publish/rclone.exe -Force }

      - name: Write usage notes
        shell: pwsh
        run: |
          $content = @(
            "ComfyCarry Companion 使用说明",
            "",
            "双击 ComfyCarry.exe 即可运行。",
            "应用目录下的其余文件为运行依赖，请勿删除。",
            "",
            "如需配置云盘，进入「生成存储配置」按向导操作即可。"
          ) -join "`r`n"
          [System.IO.File]::WriteAllText("publish/使用说明.txt", $content, [System.Text.UTF8Encoding]::new($true))

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComfyCarry-windows-x64
          path: publish
